<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Terminal Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .scanline {
            width: 100%;
            height: 2px;
            z-index: 10;
            background: rgba(0, 255, 65, 0.1);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: 0%; }
        }
        #terminal-output {
            height: calc(100vh - 60px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #004411 #0a0a0a;
        }
        #terminal-output::-webkit-scrollbar {
            width: 6px;
        }
        #terminal-output::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        #terminal-output::-webkit-scrollbar-thumb {
            background: #004411;
        }
        .command-input {
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            flex-grow: 1;
            font-family: inherit;
        }
        .prompt-symbol { color: #00ff41; }
        .dir-color { color: #5c5cff; font-weight: bold; }
        .file-color { color: #ffffff; }
        .system-msg { color: #ffff00; }
        .error-msg { color: #ff5555; }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="scanline"></div>
    
    <div id="terminal-container" class="max-w-4xl mx-auto h-full flex flex-col">
        <div id="terminal-output" class="mb-4 text-sm md:text-base whitespace-pre-wrap"></div>
        
        <div class="flex items-center gap-2 border-t border-green-900 pt-4">
            <span class="prompt-symbol">visitor@portfolio:~$</span>
            <input type="text" id="user-input" class="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('terminal-output');
        const input = document.getElementById('user-input');
        let history = [];
        let historyIndex = -1;

        // Mapping terminal filenames to actual URLs on your server
        // If a key is a string, it's a direct URL to fetch.
        const fileSystem = {
            'root': {
                'index.html': '/about.txt', // This will fetch yourdomain.com/about.txt
                'resume.md': '/assets/resume.md', 
                'projects': {
                    'web-app.js': '/js/app.js',
                    'styles.css': '/css/main.css'
                },
                'contact.txt': "Email: hello@example.com" // Strings not starting with '/' are treated as local text
            }
        };

        let currentPath = ['home'];

        const commands = {
            // ... existing help/whoami/date/pwd/ls/mkdir/touch/rm/reset commands ...

            cat: async (args) => {
                if (!args[0]) return "Usage: cat [filename]";
                let current = getDir(currentPath);
                let target = current[args[0]];

                if (target && typeof target === 'string') {
                    // Check if it looks like a path/URL
                    if (target.startsWith('/') || target.startsWith('http')) {
                        print(`<span class="system-msg">Fetching remote content from ${target}...</span>`);
                        try {
                            const response = await fetch(target);
                            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                            const content = await response.text();
                            return content;
                        } catch (e) {
                            return `<span class="error-msg">Error fetching file: ${e.message}. (Ensure the file exists at ${target} and CORS is enabled if it's on a different domain)</span>`;
                        }
                    }
                    return target; // Return local mock string
                } else if (target && typeof target === 'object') {
                    return `<span class="error-msg">cat: ${args[0]}: Is a directory</span>`;
                } else {
                    return `<span class="error-msg">cat: ${args[0]}: No such file</span>`;
                }
            },

            clear: () => {
                output.innerHTML = '';
                return null;
            }
        };

        // ... existing getDir function ...

        async function handleCommand(inputVal) {
            const trimmed = inputVal.trim();
            if (!trimmed) return;

            history.push(trimmed);
            historyIndex = history.length;
            
            print(trimmed, true);

            const parts = trimmed.split(' ');
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);

            if (commands[cmd]) {
                // We use await here because cat is now an async function
                const result = await commands[cmd](args);
                print(result);
            } else {
                print(`<span class="error-msg">Command not found: ${cmd}. Type 'help' for assistance.</span>`);
            }
        }

        // ... existing event listeners and window.onload ...
    </script>
</body>
</html>
