<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainTerminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        body {
            background-color: #0d0d0d;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            height: 100vh;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .output-line {
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .input-area {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt {
            color: #00ff41;
            margin-right: 10px;
            white-space: nowrap;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
        }

        /* Syntax Highlighting & Elements */
        .folder { color: #5dade2; font-weight: bold; }
        .file { color: #fdfefe; }
        .error { color: #e74c3c; }
        .system { color: #f1c40f; }
        .loading { color: #888; font-style: italic; }

        /* Go Board Styling */
        .go-container {
            background: #dbb06e; /* Classic wood color */
            border: 2px solid #8b5a2b;
            border-radius: 4px;
            display: inline-block;
            padding: 15px;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="terminal" onclick="focusInput()">
        <div id="output">
            <div class="output-line system">BrainTerminal v.1.0</div>
            <div class="output-line">Type 'help' to see a list of commands.</div>
            <div class="output-line">----------------------------------------</div>
        </div>
        <div class="input-area">
            <span class="prompt" id="prompt-label">synapse@brain:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        /**
         * VIRTUAL_FS CONFIGURATION
         * - Use 'url' to link to a real .md file on your server.
         * - Use 'content' for hardcoded text.
         */
        const VIRTUAL_FS = {
            "home": {
                type: "dir",
                content: {
                    "Go": {
                        type: "dir",
                        content: {
                            // EDIT THESE URLS TO POINT TO YOUR ACTUAL FILES
                            "Test.md": { type: "file", url: "/Go/Test.md" },
                        }
                    },
                    "README.md": { type: "file", url: "README.md" }
                }
            }
        };

        let currentPath = ["home"];
        const outputElement = document.getElementById('output');
        const inputElement = document.getElementById('cmd-input');
        const promptLabel = document.getElementById('prompt-label');

        function focusInput() { inputElement.focus(); }

        function scrollToBottom() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }

        function print(text, className = "") {
            const line = document.createElement('div');
            line.className = `output-line ${className}`;
            line.textContent = text;
            outputElement.appendChild(line);
            return line;
        }

        function getDirectory(pathArr) {
            let current = VIRTUAL_FS;
            for (const part of pathArr) {
                if (current[part] && current[part].type === 'dir') {
                    current = current[part].content;
                } else { return null; }
            }
            return current;
        }

        function createBoardSVG(size, boardData) {
            const cellSize = 28;
            const padding = 20;
            const totalSize = (size - 1) * cellSize + (padding * 2);
            
            const wrapper = document.createElement('div');
            wrapper.className = 'go-container';

            let svg = `<svg width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}" xmlns="http://www.w3.org/2000/svg">`;
            
            // Draw Grid Lines
            svg += `<g stroke="#444" stroke-width="1">`;
            for (let i = 0; i < size; i++) {
                // Horizontal
                svg += `<line x1="${padding}" y1="${padding + i * cellSize}" x2="${totalSize - padding}" y2="${padding + i * cellSize}" />`;
                // Vertical
                svg += `<line x1="${padding + i * cellSize}" y1="${padding}" x2="${padding + i * cellSize}" y2="${totalSize - padding}" />`;
            }
            svg += `</g>`;

            // Draw Stones
            boardData.forEach((line, y) => {
                const stones = line.split(/\s+/);
                stones.forEach((stone, x) => {
                    if (x >= size || y >= size) return;
                    const cx = padding + x * cellSize;
                    const cy = padding + y * cellSize;

                    if (stone.toUpperCase() === 'B') {
                        svg += `<circle cx="${cx}" cy="${cy}" r="${cellSize/2 - 2}" fill="#111" />`;
                    } else if (stone.toUpperCase() === 'W') {
                        svg += `<circle cx="${cx}" cy="${cy}" r="${cellSize/2 - 2}" fill="#fff" stroke="#ccc" />`;
                    }
                });
            });

            svg += `</svg>`;
            wrapper.innerHTML = svg;
            return wrapper;
        }

        function processAndDisplay(content) {
            const boardRegex = /\[go-board\]([\s\S]*?)\[\/go-board\]/g;
            
            // Split by boards so we can render text and boards in sequence
            let lastIndex = 0;
            let match;

            while ((match = boardRegex.exec(content)) !== null) {
                // 1. Print text before the board
                const beforeText = content.substring(lastIndex, match.index).trim();
                if (beforeText) print(beforeText);

                // 2. Parse board data
                const boardBlock = match[1].trim().split('\n');
                let size = 19;
                let boardLines = [];

                boardBlock.forEach(l => {
                    if (l.toLowerCase().startsWith('size:')) size = parseInt(l.split(':')[1]);
                    if (l.includes('.') || l.includes('B') || l.includes('W')) boardLines.push(l.trim());
                });

                outputElement.appendChild(createBoardSVG(size, boardLines));
                lastIndex = boardRegex.lastIndex;
            }

            // 3. Print remaining text
            const remainingText = content.substring(lastIndex).trim();
            if (remainingText) print(remainingText);
            
            scrollToBottom();
        }

        const commands = {
            help: () => {
                print("Commands: ls, cd, cat, pwd, clear, help");
            },
            pwd: () => print("/" + currentPath.join('/')),
            ls: () => {
                const dir = getDirectory(currentPath);
                Object.keys(dir).forEach(item => {
                    print(item + (dir[item].type === 'dir' ? '/' : ''), dir[item].type === 'dir' ? 'folder' : 'file');
                });
            },
            cd: (args) => {
                if (!args[0] || args[0] === "~") currentPath = ["home"];
                else if (args[0] === "..") { if (currentPath.length > 1) currentPath.pop(); }
                else {
                    const dir = getDirectory(currentPath);
                    if (dir[args[0]] && dir[args[0]].type === 'dir') currentPath.push(args[0]);
                    else print(`cd: no such directory: ${args[0]}`, "error");
                }
            },
            cat: async (args) => {
                if (!args[0]) { print("cat: missing file", "error"); return; }
                const dir = getDirectory(currentPath);
                const target = dir[args[0]];

                if (!target || target.type !== 'file') { print(`cat: ${args[0]}: No such file`, "error"); return; }

                let content = target.content;
                
                // If the file has a URL, fetch it live
                if (target.url) {
                    const loader = print(`Fetching ${target.url}...`, "loading");
                    try {
                        const res = await fetch(target.url);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        content = await res.text();
                        loader.remove();
                    } catch (e) { 
                        loader.textContent = `cat: error fetching ${target.url} (${e.message})`;
                        loader.className = "output-line error";
                        return; 
                    }
                }

                processAndDisplay(content);
            },
            clear: () => outputElement.innerHTML = ''
        };

        inputElement.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputElement.value.trim();
                const [cmd, ...args] = val.split(/\s+/);
                
                // Echo command
                const line = document.createElement('div');
                line.className = 'output-line';
                line.innerHTML = `<span class="prompt">${promptLabel.textContent}</span> ${val}`;
                outputElement.appendChild(line);

                inputElement.value = '';
                if (cmd && commands[cmd.toLowerCase()]) {
                    await commands[cmd.toLowerCase()](args);
                } else if (cmd) {
                    print(`command not found: ${cmd}`, "error");
                }

                promptLabel.textContent = `synapse@brain:/${currentPath.join('/')}$`;
                scrollToBottom();
            }
        });
    </script>
</body>
</html>
