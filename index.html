<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Terminal + Go Board Renderer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        :root {
            --term-bg: #0d0d0d;
            --term-green: #00ff41;
            --term-blue: #5dade2;
            --term-white: #fdfefe;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            height: 100vh;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scrollbar-gutter: stable;
        }

        .output-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .input-area {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt {
            color: var(--term-green);
            margin-right: 12px;
            white-space: nowrap;
            font-weight: 500;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
        }

        .folder { color: var(--term-blue); font-weight: bold; }
        .file { color: var(--term-white); }
        .error { color: #e74c3c; }
        .system { color: #f1c40f; }
        .loading { color: #888; font-style: italic; }

        .go-container {
            background: #dbb06e;
            border: 2px solid #8b5a2b;
            border-radius: 6px;
            display: inline-block;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--term-bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="terminal" onclick="focusInput()">
        <div id="output">
            <div class="output-line system">WebTerm v2.2.0 - Expanded Directory Framework</div>
            <div class="output-line">Type 'ls' to see the new structure, 'cd' to navigate.</div>
            <div class="output-line">------------------------------------------------------------</div>
        </div>
        <div class="input-area">
            <span class="prompt" id="prompt-label">visitor@web:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        /**
         * EDIT THIS OBJECT TO ADD CONTENT
         * Template for Folder: "name": { type: "dir", content: { ... } }
         * Template for File:   "name.md": { type: "file", url: "path/to/file.md" }
         * Template for String: "name.txt": { type: "file", content: "Hardcoded text here" }
         */
        const VIRTUAL_FS = {
            "home": {
                type: "dir",
                content: {
                    "readme.md": { 
                        type: "file", 
                        content: "# Navigation Guide\n\n- Use 'ls' to list contents.\n- Use 'cd <folder>' to go deeper.\n- Use 'cd ..' to go back.\n- Use 'cat <file>' to read markdown or render Go boards." 
                    },
                    "games": {
                        type: "dir",
                        content: {
                            "active": {
                                type: "dir",
                                content: {
                                    "current_match.md": { type: "file", content: "```go\nsize: 19\nblack: q16, d4\nwhite: d16, q4\n```" }
                                }
                            },
                            "archives": {
                                type: "dir",
                                content: {
                                    "2023_season": {
                                        type: "dir",
                                        content: {
                                            "final_match.md": { type: "file", url: "archives/finals.md" },
                                            "semis.md": { type: "file", url: "archives/semis.md" }
                                        }
                                    },
                                    "classic_games.md": { type: "file", url: "games/classic.md" }
                                }
                            }
                        }
                    },
                    "library": {
                        type: "dir",
                        content: {
                            "joseki": {
                                type: "dir",
                                content: {
                                    "star_point.md": { type: "file", url: "lib/joseki/star.md" },
                                    "komoku.md": { type: "file", url: "lib/joseki/komoku.md" }
                                }
                            },
                            "tsumego": {
                                type: "dir",
                                content: {
                                    "daily_puzzle.md": { type: "file", url: "lib/tsumego/daily.md" }
                                }
                            }
                        }
                    },
                    "projects": {
                        type: "dir",
                        content: {
                            "site_engine": {
                                type: "dir",
                                content: {
                                    "todo.txt": { type: "file", content: "1. Add dark mode\n2. Improve SVG rendering speed" }
                                }
                            }
                        }
                    }
                }
            }
        };

        let currentPath = ["home"];
        const outputElement = document.getElementById('output');
        const inputElement = document.getElementById('cmd-input');
        const promptLabel = document.getElementById('prompt-label');

        function focusInput() { inputElement.focus(); }

        function scrollToBottom() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }

        function print(text, className = "") {
            const line = document.createElement('div');
            line.className = `output-line ${className}`;
            line.textContent = text;
            outputElement.appendChild(line);
            scrollToBottom();
            return line;
        }

        function getDirectory(pathArr) {
            let current = VIRTUAL_FS;
            for (const part of pathArr) {
                if (current[part] && current[part].type === 'dir') {
                    current = current[part].content;
                } else { return null; }
            }
            return current;
        }

        function parseCoord(coord, size) {
            coord = coord.trim().toLowerCase();
            if (!coord) return null;
            const colChar = coord.charAt(0);
            const rowStr = coord.substring(1);
            const x = colChar.charCodeAt(0) - 97;
            const rowNum = parseInt(rowStr);
            if (isNaN(x) || isNaN(rowNum)) return null;
            const y = size - rowNum; 
            if (x < 0 || x >= size || y < 0 || y >= size) return null;
            return { x, y };
        }

        function createBoardSVG(size, stones) {
            const cellSize = 30;
            const padding = 30;
            const totalSize = (size - 1) * cellSize + (padding * 2);
            const boardId = Math.random().toString(36).substr(2, 9);
            const wrapper = document.createElement('div');
            wrapper.className = 'go-container';

            let svg = `<svg width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<g stroke="#222" stroke-width="1.2" opacity="0.8">`;
            for (let i = 0; i < size; i++) {
                svg += `<line x1="${padding}" y1="${padding + i * cellSize}" x2="${totalSize - padding}" y2="${padding + i * cellSize}" />`;
                svg += `<line x1="${padding + i * cellSize}" y1="${padding}" x2="${padding + i * cellSize}" y2="${totalSize - padding}" />`;
            }
            svg += `</g>`;

            const starPoints = [];
            if (size === 19) starPoints.push({x:3,y:3},{x:9,y:3},{x:15,y:3},{x:3,y:9},{x:9,y:9},{x:15,y:9},{x:3,y:15},{x:9,y:15},{x:15,y:15});
            else if (size === 13) starPoints.push({x:3,y:3},{x:9,y:3},{x:3,y:9},{x:9,y:9},{x:6,y:6});
            else if (size === 9) starPoints.push({x:2,y:2},{x:6,y:2},{x:2,y:6},{x:6,y:6},{x:4,y:4});

            starPoints.forEach(p => {
                svg += `<circle cx="${padding + p.x * cellSize}" cy="${padding + p.y * cellSize}" r="3.5" fill="#222" />`;
            });

            svg += `<g fill="#443322" font-size="12" font-family="monospace" font-weight="bold">`;
            for (let i = 0; i < size; i++) {
                svg += `<text x="${padding + i * cellSize}" y="${totalSize - 8}" text-anchor="middle">${String.fromCharCode(97 + i)}</text>`;
                svg += `<text x="12" y="${padding + i * cellSize + 4}" text-anchor="middle">${size - i}</text>`;
            }
            svg += `</g>`;

            svg += `<defs>
                <radialGradient id="gradB_${boardId}"><stop offset="30%" stop-color="#444"/><stop offset="100%" stop-color="#000"/></radialGradient>
                <radialGradient id="gradW_${boardId}"><stop offset="70%" stop-color="#fff"/><stop offset="100%" stop-color="#ccc"/></radialGradient>
            </defs>`;

            stones.forEach(s => {
                const cx = padding + s.x * cellSize;
                const cy = padding + s.y * cellSize;
                if (s.color === 'B') {
                    svg += `<circle cx="${cx}" cy="${cy}" r="${cellSize/2 - 2}" fill="url(#gradB_${boardId})" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.4))" />`;
                } else {
                    svg += `<circle cx="${cx}" cy="${cy}" r="${cellSize/2 - 2}" fill="url(#gradW_${boardId})" stroke="#999" stroke-width="0.5" filter="drop-shadow(2px 2px 2px rgba(0,0,0,0.2))" />`;
                }
            });

            svg += `</svg>`;
            wrapper.innerHTML = svg;
            return wrapper;
        }

        function processAndDisplay(content) {
            const goBlockRegex = /```go([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = goBlockRegex.exec(content)) !== null) {
                const beforeText = content.substring(lastIndex, match.index).trim();
                if (beforeText) print(beforeText);

                const inner = match[1].trim();
                let size = 19;
                let rawLines = inner.split('\n');
                
                rawLines.forEach(line => {
                    const sep = line.indexOf(':');
                    if (sep === -1) return;
                    const key = line.substring(0, sep).trim().toLowerCase();
                    const val = line.substring(sep + 1).trim();
                    if (key === 'size') size = parseInt(val) || 19;
                });

                let stones = [];
                rawLines.forEach(line => {
                    const sep = line.indexOf(':');
                    if (sep === -1) return;
                    const key = line.substring(0, sep).trim().toLowerCase();
                    const val = line.substring(sep + 1).trim();

                    if (key === 'black' || key === 'white') {
                        const color = (key === 'black') ? 'B' : 'W';
                        val.split(',').forEach(c => {
                            const pos = parseCoord(c, size);
                            if (pos) stones.push({ ...pos, color });
                        });
                    }
                });

                outputElement.appendChild(createBoardSVG(size, stones));
                lastIndex = goBlockRegex.lastIndex;
            }

            const remainingText = content.substring(lastIndex).trim();
            if (remainingText) print(remainingText);
            scrollToBottom();
        }

        const commands = {
            help: () => {
                print("Available commands:");
                print("  ls      - List files in current directory");
                print("  cd      - Change directory (e.g., 'cd games', 'cd active', 'cd ..')");
                print("  cat     - View file content and render boards");
                print("  pwd     - Show full current path");
                print("  clear   - Clear terminal");
            },
            pwd: () => print("/" + currentPath.join('/')),
            ls: () => {
                const dir = getDirectory(currentPath);
                if (!dir) return;
                Object.keys(dir).forEach(item => {
                    const isDir = dir[item].type === 'dir';
                    print(item + (isDir ? '/' : ''), isDir ? 'folder' : 'file');
                });
            },
            cd: (args) => {
                if (!args[0] || args[0] === "~") {
                    currentPath = ["home"];
                } else if (args[0] === "..") {
                    if (currentPath.length > 1) currentPath.pop();
                } else {
                    const dir = getDirectory(currentPath);
                    if (dir && dir[args[0]] && dir[args[0]].type === 'dir') {
                        currentPath.push(args[0]);
                    } else {
                        print(`cd: no such directory: ${args[0]}`, "error");
                    }
                }
            },
            cat: async (args) => {
                if (!args[0]) { print("cat: missing filename", "error"); return; }
                const dir = getDirectory(currentPath);
                const target = dir ? dir[args[0]] : null;
                if (!target || target.type !== 'file') {
                    print(`cat: ${args[0]}: No such file`, "error");
                    return;
                }
                let content = target.content;
                if (target.url) {
                    const loader = print(`Fetching ${target.url}...`, "loading");
                    try {
                        const res = await fetch(target.url);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        content = await res.text();
                        loader.remove();
                    } catch (e) { 
                        loader.textContent = `cat: error loading ${target.url} (${e.message})`;
                        loader.className = "output-line error";
                        return; 
                    }
                }
                processAndDisplay(content);
            },
            clear: () => outputElement.innerHTML = ''
        };

        inputElement.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputElement.value.trim();
                const [cmd, ...args] = val.split(/\s+/);
                const line = document.createElement('div');
                line.className = 'output-line';
                line.innerHTML = `<span class="prompt">${promptLabel.textContent}</span> ${val}`;
                outputElement.appendChild(line);
                inputElement.value = '';
                if (cmd) {
                    const action = commands[cmd.toLowerCase()];
                    if (action) await action(args);
                    else print(`command not found: ${cmd}`, "error");
                }
                promptLabel.textContent = `visitor@web:/${currentPath.join('/')}$`;
                scrollToBottom();
            }
        });

        window.addEventListener('resize', scrollToBottom);
    </script>
</body>
</html>
