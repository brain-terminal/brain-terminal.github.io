<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .scanline {
            width: 100%;
            height: 2px;
            z-index: 10;
            background: rgba(0, 255, 65, 0.1);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 6s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: 0%; }
        }
        #terminal-output {
            height: calc(100vh - 60px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #004411 #0a0a0a;
        }
        #terminal-output::-webkit-scrollbar {
            width: 6px;
        }
        #terminal-output::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        #terminal-output::-webkit-scrollbar-thumb {
            background: #004411;
        }
        .command-input {
            background: transparent;
            border: none;
            outline: none;
            color: #00ff41;
            flex-grow: 1;
            font-family: inherit;
        }
        .prompt-symbol { color: #00ff41; }
        .dir-color { color: #5c5cff; font-weight: bold; }
        .file-color { color: #ffffff; }
        .system-msg { color: #ffff00; }
        .error-msg { color: #ff5555; }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="scanline"></div>
    
    <div id="terminal-container" class="max-w-4xl mx-auto h-full flex flex-col">
        <div id="terminal-output" class="mb-4 text-sm md:text-base whitespace-pre-wrap"></div>
        
        <div class="flex items-center gap-2 border-t border-green-900 pt-4">
            <span class="prompt-symbol">visitor@portfolio:~$</span>
            <input type="text" id="user-input" class="command-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const output = document.getElementById('terminal-output');
        const input = document.getElementById('user-input');
        let history = [];
        let historyIndex = -1;

        // Mock File System
        const fileSystem = {
            'root': {
                'about.txt': "I am a web developer passionate about building unique digital experiences. I love retro aesthetics and terminal interfaces.",
                'projects': {
                    'terminal-web.md': "A website navigated entirely via CLI. Built with HTML/JS/Tailwind.",
                    'space-sim.txt': "A 3D simulation using Three.js.",
                    'notes.pdf': "[Binary data simulated]"
                },
                'contact.txt': "Email: hello@example.com\nGithub: github.com/username\nTwitter: @dev_handle",
                'readme.md': "Welcome! Type 'help' to see available commands. Use 'ls' to list files and 'cd' to move folders."
            }
        };

        let currentPath = ['root'];

        const commands = {
            help: () => `Available commands:
  ls       - List directory contents
  cd [dir] - Change directory
  cat [f]  - Display file content
  clear    - Clear the terminal
  whoami   - Display current user
  pwd      - Print working directory
  help     - Show this menu
  date     - Show current date`,
            
            whoami: () => "visitor",
            
            date: () => new Date().toString(),
            
            pwd: () => "/" + currentPath.join('/'),
            
            ls: () => {
                let current = getDir(currentPath);
                let items = Object.keys(current).map(key => {
                    return typeof current[key] === 'object' 
                        ? `<span class="dir-color">${key}/</span>` 
                        : `<span class="file-color">${key}</span>`;
                });
                return items.join('    ');
            },

            cd: (args) => {
                if (!args[0] || args[0] === '~') {
                    currentPath = ['home'];
                    return "";
                }
                if (args[0] === '..') {
                    if (currentPath.length > 1) currentPath.pop();
                    return "";
                }
                
                let current = getDir(currentPath);
                if (current[args[0]] && typeof current[args[0]] === 'object') {
                    currentPath.push(args[0]);
                    return "";
                } else {
                    return `<span class="error-msg">-bash: cd: ${args[0]}: No such directory</span>`;
                }
            },

            cat: (args) => {
                if (!args[0]) return "Usage: cat [filename]";
                let current = getDir(currentPath);
                if (current[args[0]] && typeof current[args[0]] === 'string') {
                    return current[args[0]];
                } else if (current[args[0]] && typeof current[args[0]] === 'object') {
                    return `<span class="error-msg">cat: ${args[0]}: Is a directory</span>`;
                } else {
                    return `<span class="error-msg">cat: ${args[0]}: No such file</span>`;
                }
            },

            clear: () => {
                output.innerHTML = '';
                return null;
            }
        };

        function getDir(path) {
            let current = fileSystem;
            for (let part of path) {
                current = current[part];
            }
            return current;
        }

        function print(text, isCommand = false) {
            if (text === null) return;
            const line = document.createElement('div');
            line.className = 'mb-2';
            if (isCommand) {
                line.innerHTML = `<span class="prompt-symbol">visitor@portfolio:${commands.pwd()}$</span> ${text}`;
            } else {
                line.innerHTML = text;
            }
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function handleCommand(inputVal) {
            const trimmed = inputVal.trim();
            if (!trimmed) return;

            history.push(trimmed);
            historyIndex = history.length;
            
            print(trimmed, true);

            const parts = trimmed.split(' ');
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);

            if (commands[cmd]) {
                const result = commands[cmd](args);
                print(result);
            } else {
                print(`<span class="error-msg">Command not found: ${cmd}. Type 'help' for assistance.</span>`);
            }
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleCommand(input.value);
                input.value = '';
            } else if (e.key === 'ArrowUp') {
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = history[historyIndex];
                }
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    input.value = history[historyIndex];
                } else {
                    historyIndex = history.length;
                    input.value = '';
                }
                e.preventDefault();
            }
        });

        // Initialize
        window.onload = () => {
            print("Synapses firing...\n[OK]\nType 'help' to begin.\n");
            input.focus();
        };

        // Keep input focused
        document.addEventListener('click', () => input.focus());
    </script>
</body>
</html>
