<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainTerminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        :root {
            --term-bg: #0d0d0d;
            --term-green: #00ff41;
            --term-green-dim: rgba(0, 255, 65, 0.3);
            --term-blue: #5dade2;
            --term-white: #fdfefe;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
        }

        #terminal {
            height: 100vh;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scrollbar-gutter: stable;
        }

        .output-line {
            margin-bottom: 6px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        .input-area {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt {
            color: var(--term-green);
            margin-right: 12px;
            white-space: nowrap;
            font-weight: 500;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
        }

        .folder { color: var(--term-blue); font-weight: bold; }
        .file { color: var(--term-white); }
        .error { color: #e74c3c; }
        .system { color: #f1c40f; }
        .loading { color: #888; font-style: italic; }

        .go-container {
            background: #000;
            border: 1px solid var(--term-green);
            border-radius: 8px;
            display: inline-block;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--term-bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="terminal" onclick="focusInput()">
        <div id="output">
            <div class="output-line system">BrainTerminal v.4.0.0</div>
            <div class="output-line">Type 'help' to see a list of available commands.</div>
            <div class="output-line">------------------------------------------------------------</div>
        </div>
        <div class="input-area">
            <span class="prompt" id="prompt-label">visitor@web:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const VIRTUAL_FS = {
            "home": {
                type: "dir",
                content: {
                    "README.md": { 
                        type: "file", 
                        url: "README.md" 
                    },
                    "Go": {
                        type: "dir",
                        content: {
                            "Beginner": {
                                type: "dir",
                                content: {
                                    "equipment.md": { type: "file", url: "Go/Beginner/equipment.md" }
                                }
                            }
                        }
                    }
                }
            }
        };

        let currentPath = ["home"];
        const outputElement = document.getElementById('output');
        const inputElement = document.getElementById('cmd-input');
        const promptLabel = document.getElementById('prompt-label');

        function focusInput() { inputElement.focus(); }
        function scrollToBottom() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }

        function print(text, className = "") {
            const line = document.createElement('div');
            line.className = `output-line ${className}`;
            line.textContent = text;
            outputElement.appendChild(line);
            scrollToBottom();
            return line;
        }

        function parseCoord(input, size) {
            const regex = /^([a-z])(\d+)(?:\((.*)\))?$/i;
            const match = input.trim().match(regex);
            if (!match) return null;

            let colChar = match[1].toUpperCase();
            const rowStr = match[2];
            const label = match[3] || null;

            // In Go, 'I' is often skipped to avoid confusion with '1' or 'J'
            // We'll calculate X based on standard alphabetical order first
            let x = colChar.charCodeAt(0) - 65;
            
            const rowNum = parseInt(rowStr);
            const y = size - rowNum; 

            if (x < 0 || x >= size || y < 0 || y >= size) return null;
            return { x, y, label };
        }

        function createBoardSVG(size, stones, viewportStr) {
            const cellSize = 34;
            const padding = 30;
            const termGreen = "#00ff41";

            let vMinX = 0, vMaxX = size - 1, vMinY = 0, vMaxY = size - 1;
            if (viewportStr) {
                const parts = viewportStr.split('-');
                if (parts.length === 2) {
                    const start = parseCoord(parts[0], size);
                    const end = parseCoord(parts[1], size);
                    if (start && end) {
                        vMinX = Math.min(start.x, end.x);
                        vMaxX = Math.max(start.x, end.x);
                        vMinY = Math.min(start.y, end.y);
                        vMaxY = Math.max(start.y, end.y);
                    }
                }
            }

            const vWidth = vMaxX - vMinX;
            const vHeight = vMaxY - vMinY;
            const svgWidth = vWidth * cellSize + (padding * 2);
            const svgHeight = vHeight * cellSize + (padding * 2);

            const wrapper = document.createElement('div');
            wrapper.className = 'go-container';

            let svg = `<svg width="${svgWidth}" height="${svgHeight}" viewBox="0 0 ${svgWidth} ${svgHeight}" xmlns="http://www.w3.org/2000/svg">`;
            
            // Rendering Phosphor Grid
            svg += `<g stroke="${termGreen}" stroke-width="1" opacity="0.4">`;
            for (let i = 0; i < size; i++) {
                if (i >= vMinY && i <= vMaxY) {
                    const yPos = padding + (i - vMinY) * cellSize;
                    svg += `<line x1="${padding}" y1="${yPos}" x2="${svgWidth - padding}" y2="${yPos}" />`;
                }
                if (i >= vMinX && i <= vMaxX) {
                    const xPos = padding + (i - vMinX) * cellSize;
                    svg += `<line x1="${xPos}" y1="${padding}" x2="${xPos}" y2="${svgHeight - padding}" />`;
                }
            }
            svg += `</g>`;

            // Star Points (Hoshi)
            const starPoints = [];
            if (size === 19) starPoints.push({x:3,y:3},{x:9,y:3},{x:15,y:3},{x:3,y:9},{x:9,y:9},{x:15,y:9},{x:3,y:15},{x:9,y:15},{x:15,y:15});
            starPoints.forEach(p => {
                if (p.x >= vMinX && p.x <= vMaxX && p.y >= vMinY && p.y <= vMaxY) {
                    svg += `<circle cx="${padding + (p.x - vMinX) * cellSize}" cy="${padding + (p.y - vMinY) * cellSize}" r="3" fill="${termGreen}" />`;
                }
            });

            svg += `<g fill="${termGreen}" font-size="12" font-family="'Fira Code', monospace" font-weight="bold" opacity="0.9">`;
            for (let i = vMinX; i <= vMaxX; i++) {
                // Using 65 for uppercase 'A'
                svg += `<text x="${padding + (i - vMinX) * cellSize}" y="${svgHeight - 6}" text-anchor="middle">${String.fromCharCode(65 + i)}</text>`;
            }
            for (let i = vMinY; i <= vMaxY; i++) {
                svg += `<text x="12" y="${padding + (i - vMinY) * cellSize + 4}" text-anchor="middle">${size - i}</text>`;
            }
            svg += `</g>`;

            stones.forEach(s => {
                if (s.x >= vMinX && s.x <= vMaxX && s.y >= vMinY && s.y <= vMaxY) {
                    const cx = padding + (s.x - vMinX) * cellSize;
                    const cy = padding + (s.y - vMinY) * cellSize;
                    const r = cellSize / 2 - 3;
                    
                    if (s.color === 'B') {
                        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#000" stroke="${termGreen}" stroke-width="1.5" />`;
                        if (s.label) {
                            svg += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" fill="${termGreen}" font-size="12" font-family="'Fira Code'">${s.label}</text>`;
                        }
                    } else if (s.color === 'W') {
                        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${termGreen}" />`;
                        if (s.label) {
                            svg += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" fill="#000" font-size="12" font-family="'Fira Code'" font-weight="bold">${s.label}</text>`;
                        }
                    } else {
                        // Color 'N' (Neutral/Mark)
                        if (s.label) {
                            // Draw a small background glow for the label to ensure legibility over lines
                            svg += `<rect x="${cx - 8}" y="${cy - 8}" width="16" height="16" fill="#000" />`;
                            svg += `<text x="${cx}" y="${cy + 4}" text-anchor="middle" fill="${termGreen}" font-size="14" font-family="'Fira Code'" font-weight="bold">${s.label}</text>`;
                        }
                    }
                }
            });

            svg += `</svg>`;
            wrapper.innerHTML = svg;
            return wrapper;
        }

        function processAndDisplay(content) {
            const goBlockRegex = /```go([\s\S]*?)```/g;
            let lastIndex = 0;
            let match;

            while ((match = goBlockRegex.exec(content)) !== null) {
                const beforeText = content.substring(lastIndex, match.index).trim();
                if (beforeText) print(beforeText);

                const inner = match[1].trim();
                let size = 19;
                let viewport = null;
                let stones = [];
                let rawLines = inner.split('\n');
                
                rawLines.forEach(line => {
                    const sep = line.indexOf(':');
                    if (sep === -1) return;
                    const key = line.substring(0, sep).trim().toLowerCase();
                    const val = line.substring(sep + 1).trim();
                    if (key === 'size') size = parseInt(val) || 19;
                    if (key === 'viewport') viewport = val;
                });

                rawLines.forEach(line => {
                    const sep = line.indexOf(':');
                    if (sep === -1) return;
                    const key = line.substring(0, sep).trim().toLowerCase();
                    const val = line.substring(sep + 1).trim();
                    
                    const colorMap = { 'black': 'B', 'white': 'W', 'marks': 'N' };
                    if (colorMap[key]) {
                        val.split(',').forEach(c => {
                            const pos = parseCoord(c, size);
                            if (pos) stones.push({ ...pos, color: colorMap[key] });
                        });
                    }
                });

                outputElement.appendChild(createBoardSVG(size, stones, viewport));
                lastIndex = goBlockRegex.lastIndex;
            }

            const remainingText = content.substring(lastIndex).trim();
            if (remainingText) print(remainingText);
            scrollToBottom();
        }

        const commands = {
            help: () => {
                print("Commands: ls, cd, cat, pwd, clear, help");
                print("Board Syntax: black: A1(1), white: B2(2), marks: C3(X)");
            },
            pwd: () => print("/" + currentPath.join('/')),
            ls: () => {
                const dir = getDirectory(currentPath);
                if (!dir) return;
                Object.keys(dir).forEach(item => {
                    const isDir = dir[item].type === 'dir';
                    print(item + (isDir ? '/' : ''), isDir ? 'folder' : 'file');
                });
            },
            cd: (args) => {
                if (!args[0] || args[0] === "~") { currentPath = ["home"]; }
                else if (args[0] === "..") { if (currentPath.length > 1) currentPath.pop(); }
                else {
                    const dir = getDirectory(currentPath);
                    if (dir && dir[args[0]] && dir[args[0]].type === 'dir') { currentPath.push(args[0]); }
                    else { print(`cd: no such directory: ${args[0]}`, "error"); }
                }
            },
            cat: async (args) => {
                if (!args[0]) { print("cat: missing filename", "error"); return; }
                const dir = getDirectory(currentPath);
                const target = dir ? dir[args[0]] : null;
                if (!target || target.type !== 'file') { print(`cat: ${args[0]}: No such file`, "error"); return; }
                
                let content = target.content;
                if (target.url) {
                    const loader = print(`Fetching ${target.url}...`, "loading");
                    try {
                        const res = await fetch(target.url);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        content = await res.text();
                        loader.remove();
                    } catch (e) { 
                        loader.textContent = `cat: error loading ${target.url}`;
                        loader.className = "output-line error";
                        return; 
                    }
                }
                processAndDisplay(content);
            },
            clear: () => outputElement.innerHTML = ''
        };

        function getDirectory(pathArr) {
            let current = VIRTUAL_FS;
            for (const part of pathArr) {
                if (current[part] && current[part].type === 'dir') {
                    current = current[part].content;
                } else { return null; }
            }
            return current;
        }

        inputElement.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputElement.value.trim();
                const [cmd, ...args] = val.split(/\s+/);
                const line = document.createElement('div');
                line.className = 'output-line';
                line.innerHTML = `<span class="prompt">${promptLabel.textContent}</span> ${val}`;
                outputElement.appendChild(line);
                inputElement.value = '';
                if (cmd) {
                    const action = commands[cmd.toLowerCase()];
                    if (action) await action(args);
                    else print(`command not found: ${cmd}`, "error");
                }
                promptLabel.textContent = `visitor@web:/${currentPath.join('/')}$`;
                scrollToBottom();
            }
        });

        window.addEventListener('resize', scrollToBottom);
    </script>
</body>
</html>
