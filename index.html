
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        :root {
            --term-bg: #0d0d0d;
            --term-green: #00ff41;
            --term-green-dim: rgba(0, 255, 65, 0.2);
            --term-blue: #5dade2;
            --term-white: #fdfefe;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            font-size: clamp(0.85rem, 2vw, 1rem);
        }

        #terminal {
            height: 100vh;
            padding: 15px;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            scrollbar-gutter: stable;
        }

        @media (min-width: 768px) {
            #terminal { padding: 30px; }
        }

        .output-line {
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-break: break-all; /* Critical: Forces wrapping even on long strings without spaces */
            line-height: 1.5;
            width: 100%;
        }

        .ls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-bottom: 8px;
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            margin-top: 10px;
            padding-bottom: 30px;
            width: 100%;
        }

        .prompt {
            color: var(--term-green);
            margin-right: 8px;
            white-space: nowrap;
            font-weight: 500;
        }

        #cmd-input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            min-width: 100px;
            word-break: break-all; /* Ensures typed text wraps at screen edge */
        }

        .folder { color: var(--term-blue); font-weight: bold; }
        .file { color: var(--term-white); }
        .error { color: #ff5555; }
        .system { color: #f1c40f; }
        .loading { color: #888; font-style: italic; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--term-bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="terminal" onclick="focusInput()">
        <div id="output">
            <div class="output-line system">BrainTerminal v6.1.3</div>
            <div class="output-line">Type 'help' for a list of available commands.</div>
        </div>
        <div class="input-area">
            <span class="prompt" id="prompt-label">visitor@brain:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false" enterkeyhint="go">
        </div>
    </div>

    <script>
        const VIRTUAL_FS = {
            "root": {
                type: "dir",
                content: {
                    "README.md": { 
                        type: "file", 
                        url: "README.md" 
                    },
                    "topics": {
                        type: "dir",
                        content: {
                            "go": {
                                type: "dir",
                                content: {
                                    "beginner": { 
                                        type: "dir", 
                                        content: {
                                            "equipment.md": { type: "file", url: "go/beginner/equipment.md" }, 
                                            "object-of-the-game.md": { type: "file", url: "go/beginner/object-of-the-game.md" }
                                        }
                                    }
                                }
                            },
                             "japanese": {
                                type: "dir",
                                content: {
                                    "jlpt-n5": { 
                                        type: "dir", 
                                        content: {
                                            "kana.md": { type: "file", url: "kana.md" } 
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        };

        let currentPath = ["root"];
        const outputElement = document.getElementById('output');
        const inputElement = document.getElementById('cmd-input');
        const promptLabel = document.getElementById('prompt-label');

        function focusInput() { inputElement.focus(); }

        function scrollToBottom() {
            const term = document.getElementById('terminal');
            term.scrollTop = term.scrollHeight;
        }

        function print(text, className = "") {
            const line = document.createElement('div');
            line.className = `output-line ${className}`;
            line.textContent = text;
            outputElement.appendChild(line);
            scrollToBottom();
            return line; 
        }

        function updatePrompt() {
            let displayPath = "";
            if (currentPath.length === 1 && currentPath[0] === "root") {
                displayPath = "~";
            } else {
                const visualParts = currentPath.slice(1);
                displayPath = "~/" + visualParts.join('/');
            }
            promptLabel.textContent = `visitor@brain:${displayPath}$`;
        }

        function getDirectory(pathArr) {
            let current = VIRTUAL_FS;
            for (const part of pathArr) {
                if (current[part] && current[part].type === 'dir') current = current[part].content;
                else return null;
            }
            return current;
        }

        const commands = {
            help: () => {
                print("Commands: ls, cd, cat, pwd, clear, help");
            },
            pwd: () => {
                const visual = currentPath.length === 1 ? "~" : "~/" + currentPath.slice(1).join('/');
                print(visual);
            },
            ls: () => {
                const dir = getDirectory(currentPath);
                if (!dir) return;
                const grid = document.createElement('div');
                grid.className = 'ls-grid';
                Object.keys(dir).forEach(item => {
                    const span = document.createElement('span');
                    span.className = dir[item].type === 'dir' ? 'folder' : 'file';
                    span.textContent = item + (dir[item].type === 'dir' ? '/' : '');
                    grid.appendChild(span);
                });
                outputElement.appendChild(grid);
            },
            cd: (args) => {
                if (!args[0] || args[0] === "~") {
                    currentPath = ["root"];
                } else {
                    const pathString = args[0];
                    const parts = pathString.split('/').filter(p => p !== "" && p !== ".");
                    let tempPath = pathString.startsWith('/') ? ["root"] : [...currentPath];
                    if (pathString.startsWith('~')) {
                        tempPath = ["root"];
                        parts.shift();
                    }

                    for (const part of parts) {
                        if (part === "..") {
                            if (tempPath.length > 1) tempPath.pop();
                        } else {
                            const currentDir = getDirectory(tempPath);
                            if (currentDir && currentDir[part] && currentDir[part].type === 'dir') {
                                tempPath.push(part);
                            } else {
                                print(`cd: no such directory: ${pathString}`, "error");
                                return;
                            }
                        }
                    }
                    currentPath = tempPath;
                }
                updatePrompt();
            },
            cat: async (args) => {
                if (!args[0]) { print("cat: missing filename", "error"); return; }
                const dir = getDirectory(currentPath);
                const target = dir ? dir[args[0]] : null;
                
                if (!target || target.type !== 'file') { 
                    print(`cat: ${args[0]}: No such file`, "error"); 
                    return; 
                }

                // If content is already present in FS
                if (target.content) {
                    print(target.content);
                } 
                // If it's a URL, fetch it
                else if (target.url) {
                    const loadingLine = print(`Fetching ${target.url}...`, "loading");
                    try {
                        const response = await fetch(target.url);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const text = await response.text();
                        loadingLine.remove();
                        print(text);
                    } catch (err) {
                        loadingLine.textContent = `cat: error fetching ${target.url}: ${err.message}`;
                        loadingLine.className = "output-line error";
                    }
                } else {
                    print("[Empty File]");
                }
            },
            clear: () => outputElement.innerHTML = ''
        };

        inputElement.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputElement.value;
                const [cmd, ...args] = val.trim().split(/\s+/);
                
                const line = document.createElement('div');
                line.className = 'output-line';
                line.innerHTML = `<span class="prompt">${promptLabel.textContent}</span> ${val}`;
                outputElement.appendChild(line);
                
                inputElement.value = '';
                if (cmd) {
                    const action = commands[cmd.toLowerCase()];
                    if (action) {
                        // Check if action is async
                        if (action.constructor.name === "AsyncFunction") {
                            await action(args);
                        } else {
                            action(args);
                        }
                    }
                    else print(`command not found: ${cmd}`, "error");
                }
                scrollToBottom();
            }
        });

        // Initialize display
        updatePrompt();
    </script>
</body>
</html>
